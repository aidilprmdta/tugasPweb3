<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator JavaScript</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="kalkulator">
        <div id="layar" class="layar">0</div>
        
        <div class="tombol-grid">
            <button onclick="bersihkan()" class="tombol-clear">C</button>
            <button onclick="pilihOperator('/')" class="tombol-operator">/</button>
            <button onclick="pilihOperator('*')" class="tombol-operator">*</button>
            <button onclick="pilihOperator('-')" class="tombol-operator">-</button>
            
            <button onclick="tambahAngka('7')">7</button>
            <button onclick="tambahAngka('8')">8</button>
            <button onclick="tambahAngka('9')">9</button>
            <button onclick="pilihOperator('+')" class="tombol-operator" style="grid-row: span 2;">+</button>
            
            <button onclick="tambahAngka('4')">4</button>
            <button onclick="tambahAngka('5')">5</button>
            <button onclick="tambahAngka('6')">6</button>
            
            <button onclick="tambahAngka('1')">1</button>
            <button onclick="tambahAngka('2')">2</button>
            <button onclick="tambahAngka('3')">3</button>
            <button onclick="hitung()" class="tombol-samadengan" style="grid-row: span 2;">=</button>
            
            <button onclick="tambahAngka('0')" style="grid-column: span 2;">0</button>
            <button onclick="tambahAngka('.')">.</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
